# OpenClaw Reusable CI — Swift / iOS Projects
#
# Runs build + test + SwiftLint for iOS/Swift repos.
# Supports both SPM packages and Xcode projects (project.yml via xcodegen).
#
# Usage:
#   jobs:
#     ci:
#       uses: Diomandeee/.github/.github/workflows/reusable-ci-swift.yml@main
#       with:
#         scheme: MyApp            # optional — auto-detected if empty
#         xcode-version: "16.2"   # optional — defaults to 16.2
#         runner: macos-14        # optional — defaults to macos-14
#
# Inputs:
#   xcode-version    string  "16.2"    Xcode version for build/test
#   scheme           string  ""        Xcode scheme; auto-detected from .xcodeproj if empty
#   test-destination string  "platform=iOS Simulator,name=iPhone 16"
#   project-path     string  "."       Subdir containing .xcodeproj or Package.swift
#   run-tests        bool    true      Set false to skip test steps (build + lint only)
#   runner           string  "macos-14"  GitHub runner image for build job
#
# Known limitations:
#   - Scheme auto-detection picks schemes[0]; monorepos must pass scheme: explicitly
#   - SwiftLint runs on ubuntu-latest via Docker (norio-nomura/action-swiftlint)

name: Reusable CI — Swift

on:
  workflow_call:
    inputs:
      xcode-version:
        description: 'Xcode version to use'
        required: false
        type: string
        default: '16.2'
      scheme:
        description: 'Xcode scheme (auto-detected if empty)'
        required: false
        type: string
        default: ''
      test-destination:
        description: 'Test destination'
        required: false
        type: string
        default: 'platform=iOS Simulator,name=iPhone 16'
      project-path:
        description: 'Subdirectory containing the Xcode project (if not root)'
        required: false
        type: string
        default: '.'
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      runner:
        description: 'GitHub runner image for the build job'
        required: false
        type: string
        default: 'macos-14'

concurrency:
  group: ci-swift-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ inputs.xcode-version }}.app/Contents/Developer

    steps:
      - name: Validate inputs
        env:
          PROJECT_PATH: ${{ inputs.project-path }}
        run: |
          if [[ "$PROJECT_PATH" == *".."* || "$PROJECT_PATH" == /* ]]; then
            echo "::error::project-path must be a relative path without '..'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd  # v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Cache SPM
        id: cache-spm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ${{ inputs.project-path }}/SourcePackages
          key: ${{ runner.os }}-${{ github.repository }}-spm-${{ inputs.xcode-version }}-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.repository }}-spm-${{ inputs.xcode-version }}-

      - name: Resolve dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi

      - name: Detect project type
        id: project_type
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f Package.swift ]; then
            echo "type=spm" >> "$GITHUB_OUTPUT"
          else
            echo "type=xcode" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect scheme
        id: scheme
        working-directory: ${{ inputs.project-path }}
        env:
          INPUT_SCHEME: ${{ inputs.scheme }}
        run: |
          if [ -n "$INPUT_SCHEME" ]; then
            echo "name=$INPUT_SCHEME" >> "$GITHUB_OUTPUT"
            echo "Using provided scheme: $INPUT_SCHEME"
          else
            SCHEME=$(xcodebuild -list -json 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); schemes=d.get('project',d.get('workspace',{})).get('schemes',[]); print(schemes[0] if schemes else '')" \
              2>/dev/null || echo "")
            echo "name=$SCHEME" >> "$GITHUB_OUTPUT"
            echo "Detected scheme: $SCHEME"
          fi

      - name: Assert scheme found
        if: steps.project_type.outputs.type == 'xcode'
        env:
          SCHEME: ${{ steps.scheme.outputs.name }}
        run: |
          if [ -z "$SCHEME" ]; then
            echo "::error::No Xcode scheme detected and none was provided via the 'scheme' input."
            echo "::error::Run 'xcodebuild -list' locally and pass scheme: <name> in your workflow."
            exit 1
          fi

      - name: Generate project (xcodegen)
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f project.yml ] && ! ls *.xcodeproj 1>/dev/null 2>&1; then
            if ! command -v xcodegen &>/dev/null; then
              brew install xcodegen
            fi
            xcodegen generate
          fi

      - name: Build (SPM)
        if: steps.project_type.outputs.type == 'spm'
        working-directory: ${{ inputs.project-path }}
        run: swift build -Xswiftc -suppress-warnings

      - name: Build (Xcode)
        if: steps.project_type.outputs.type == 'xcode' && steps.scheme.outputs.name != ''
        working-directory: ${{ inputs.project-path }}
        env:
          SCHEME: ${{ steps.scheme.outputs.name }}
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Test (SPM)
        if: inputs.run-tests && steps.project_type.outputs.type == 'spm'
        working-directory: ${{ inputs.project-path }}
        run: |
          set -o pipefail
          swift test --enable-code-coverage 2>&1 | xcpretty --color

      - name: Test (Xcode)
        if: inputs.run-tests && steps.project_type.outputs.type == 'xcode' && steps.scheme.outputs.name != ''
        working-directory: ${{ inputs.project-path }}
        env:
          SCHEME: ${{ steps.scheme.outputs.name }}
          TEST_DEST: ${{ inputs.test-destination }}
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$TEST_DEST" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color

      - name: Upload test results
        if: inputs.run-tests && (success() || failure())
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results-${{ github.run_number }}
          path: ${{ inputs.project-path }}/TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@b3fcfb2c5a82d46c48495dda0bcb4c0e981bfc54  # 3.2.1
        with:
          args: --reporter github-actions-logging
        env:
          WORKING_DIRECTORY: ${{ inputs.project-path }}
