# OpenClaw Reusable CI — Swift / iOS Projects
# Usage: reference from any iOS repo's .github/workflows/ci.yml
#   jobs:
#     ci:
#       uses: Diomandeee/.github/.github/workflows/reusable-ci-swift.yml@main
#       with:
#         xcode-version: "16.2"

name: Reusable CI — Swift

on:
  workflow_call:
    inputs:
      xcode-version:
        description: 'Xcode version to use'
        required: false
        type: string
        default: '16.2'
      scheme:
        description: 'Xcode scheme (auto-detected if empty)'
        required: false
        type: string
        default: ''
      test-destination:
        description: 'Test destination'
        required: false
        type: string
        default: 'platform=iOS Simulator,name=iPhone 16'
      project-path:
        description: 'Subdirectory containing the Xcode project (if not root)'
        required: false
        type: string
        default: '.'
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true

concurrency:
  group: ci-swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_${{ inputs.xcode-version }}.app/Contents/Developer

jobs:
  # ── Build & Test ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ${{ inputs.project-path }}/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi

      - name: Detect scheme
        id: scheme
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -n "${{ inputs.scheme }}" ]; then
            echo "name=${{ inputs.scheme }}" >> "$GITHUB_OUTPUT"
            echo "Using provided scheme: ${{ inputs.scheme }}"
          else
            SCHEME=$(xcodebuild -list -json 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); schemes=d.get('project',d.get('workspace',{})).get('schemes',[]); print(schemes[0] if schemes else '')" \
              2>/dev/null || echo "")
            echo "name=$SCHEME" >> "$GITHUB_OUTPUT"
            echo "Detected scheme: $SCHEME"
          fi

      - name: Generate project (xcodegen)
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f project.yml ] && ! ls *.xcodeproj 1>/dev/null 2>&1; then
            brew install xcodegen 2>/dev/null || true
            xcodegen generate
          fi

      - name: Build (SPM)
        if: hashFiles(format('{0}/Package.swift', inputs.project-path)) != ''
        working-directory: ${{ inputs.project-path }}
        run: swift build -Xswiftc -suppress-warnings

      - name: Build (Xcode)
        if: hashFiles(format('{0}/Package.swift', inputs.project-path)) == '' && steps.scheme.outputs.name != ''
        working-directory: ${{ inputs.project-path }}
        run: |
          xcodebuild build \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Test (SPM)
        if: inputs.run-tests && hashFiles(format('{0}/Package.swift', inputs.project-path)) != ''
        working-directory: ${{ inputs.project-path }}
        run: swift test --enable-code-coverage 2>&1 | xcpretty --color || true

      - name: Test (Xcode)
        if: inputs.run-tests && hashFiles(format('{0}/Package.swift', inputs.project-path)) == '' && steps.scheme.outputs.name != ''
        working-directory: ${{ inputs.project-path }}
        run: |
          xcodebuild test \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -destination '${{ inputs.test-destination }}' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ inputs.project-path }}/TestResults.xcresult
          if-no-files-found: ignore

  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint 2>/dev/null || true

      - name: Lint
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f .swiftlint.yml ]; then
            swiftlint lint --reporter github-actions-logging --strict || true
          else
            swiftlint lint --reporter github-actions-logging || true
          fi
