# OpenClaw Reusable TestFlight Upload
# Usage: reference from any iOS repo's .github/workflows/testflight.yml
#   jobs:
#     upload:
#       uses: Diomandeee/.github/.github/workflows/reusable-testflight.yml@main
#       with:
#         scheme: MyApp
#         bundle-id: com.openclaw.myapp
#       secrets: inherit

name: Reusable TestFlight Upload

on:
  workflow_call:
    inputs:
      scheme:
        description: 'Xcode scheme to archive'
        required: true
        type: string
      bundle-id:
        description: 'App bundle identifier'
        required: true
        type: string
      project-path:
        description: 'Subdirectory containing the Xcode project'
        required: false
        type: string
        default: '.'
      xcode-version:
        description: 'Xcode version'
        required: false
        type: string
        default: '16.2'
      build-number-override:
        description: 'Manual build number override'
        required: false
        type: string
        default: ''
      export-options-path:
        description: 'Path to ExportOptions.plist (relative to project-path)'
        required: false
        type: string
        default: 'ExportOptions.plist'
      project-flag:
        description: 'Use -project or -workspace flag'
        required: false
        type: string
        default: ''
      supabase-log:
        description: 'Log delivery to Supabase'
        required: false
        type: boolean
        default: false
    secrets:
      BUILD_CERTIFICATE_BASE64:
        required: true
      P12_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      ASC_KEY_BASE64:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      SUPABASE_URL:
        required: false
      SUPABASE_KEY:
        required: false

env:
  TEAM_ID: 8643C988C4

jobs:
  build-and-upload:
    name: Archive & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ${{ inputs.project-path }}/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Generate project (xcodegen)
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -f project.yml ]; then
            brew install xcodegen 2>/dev/null || true
            xcodegen generate
          fi

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install App Store Connect API Key
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Determine Build Number
        id: build_number
        run: |
          if [ -n "${{ inputs.build-number-override }}" ]; then
            echo "number=${{ inputs.build-number-override }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Archive
        working-directory: ${{ inputs.project-path }}
        run: |
          EXTRA_FLAGS=""
          if [ -n "${{ inputs.project-flag }}" ]; then
            EXTRA_FLAGS="${{ inputs.project-flag }}"
          fi

          xcodebuild archive \
            -scheme "${{ inputs.scheme }}" \
            $EXTRA_FLAGS \
            -archivePath $RUNNER_TEMP/${{ inputs.scheme }}.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION=${{ steps.build_number.outputs.number }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID

      - name: Export
        working-directory: ${{ inputs.project-path }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/${{ inputs.scheme }}.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ${{ inputs.export-options-path }} \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/${{ inputs.scheme }}.ipa" \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }} \
            2>&1 || true

      - name: Log delivery to Supabase
        if: inputs.supabase-log && secrets.SUPABASE_URL != ''
        run: |
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/testflight_deliveries" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"app_name\": \"${{ inputs.scheme }}\",
              \"bundle_id\": \"${{ inputs.bundle-id }}\",
              \"build_number\": \"${{ steps.build_number.outputs.number }}\",
              \"trigger\": \"${{ github.event_name }}\",
              \"ref\": \"${{ github.ref }}\",
              \"status\": \"uploaded\",
              \"github_run_id\": \"${{ github.run_id }}\"
            }" || true

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Summary
        run: |
          echo "## TestFlight Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | ${{ inputs.scheme }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bundle** | ${{ inputs.bundle-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | ${{ steps.build_number.outputs.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ref** | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
