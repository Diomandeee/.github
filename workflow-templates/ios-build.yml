name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve dependencies
        run: |
          if [ -f Package.swift ]; then
            swift package resolve
          fi

      - name: Build
        run: |
          SCHEME=$(xcodebuild -list -json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('project',{}).get('schemes',[''])[0])" 2>/dev/null || echo "")
          if [ -n "$SCHEME" ]; then
            xcodebuild build -scheme "$SCHEME" -destination 'generic/platform=iOS Simulator' -skipPackagePluginValidation CODE_SIGNING_ALLOWED=NO | tail -20
          else
            echo "No scheme found — skipping build"
          fi
