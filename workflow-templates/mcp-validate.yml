name: MCP Server Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci || npm install || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt || true

      - name: Check MCP server starts
        run: |
          if [ -f index.js ]; then
            timeout 10 node index.js --help 2>&1 || echo "Server startup check done"
          elif [ -f server.py ]; then
            timeout 10 python3 -c "import importlib.util; spec=importlib.util.spec_from_file_location('server','server.py'); mod=importlib.util.module_from_spec(spec); print('Module loads OK')" 2>&1 || echo "Module check done"
          fi

      - name: Lint
        run: |
          if [ -f index.js ] || [ -f index.ts ]; then
            npx eslint . --ext .js,.ts --max-warnings 0 || true
          elif [ -f server.py ]; then
            pip install ruff 2>/dev/null
            ruff check . || true
          fi
